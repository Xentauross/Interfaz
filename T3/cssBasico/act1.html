<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: "Roboto";
        }

        #tarjeta {
            background-color: #f0f4ff;
            padding: 20px;
            border-radius: 10px;
            max-width: 320px;
        }

        .titulo {
            color: #1e3799;
        }

        h2.titulo {
            font-size: 1.4rem;
        }

        #tarjeta p {
            margin-top: 10px;
        }

        a {
            color: #4a69bd;
            font-weight: bold;
        }

        a:hover {
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div id="tarjeta">
        <h2 class="titulo">Mi tarjeta</h2>
        <p>Esta es una descripción breve creada para el ejercicio</p>
        <p><a href="#" target="_blank">Ver más</a></p>

</html>
