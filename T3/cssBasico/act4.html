<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 4</title>

    <style>
        #adaptable {
            background-color: #74b9ff;
            padding: 20px;
            margin: 2em;
            display: block;
            border-radius: 20px;
            box-shadow: 5px 5px lightgrey;
            box-sizing: border-box;
        }

        @media(max-width:500px) {
            #adaptable {
                background-color: #ff7675;
            }
        }

        @media print {
            #adaptable {
                background-color: white;
                border: 1px solid black;
                box-shadow: none;
            }
        }
    </style>
</head>

<body>
    <div id="adaptable">
        <h2>Bloque adaptable</h2>
        <p>Este bloque cambia de aspecto cuando la pantalla es pequeña o cuando lo imprimes.</p>
    </div>
</body>

</html>
