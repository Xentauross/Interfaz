<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Datos</title>
    <style>
        table {
            width: 50%;
            border-collapse: collapse;
            margin: 20px auto;
        }

        th,
        td {
            border: 1px solid #000;
            padding: 8px 12px;
            text-align: center;
        }

        caption {
            caption-side: bottom;
        }

        th {
            background-color: #f2f2f2;
        }

        tfoot td {
            font-weight: bold;
            background-color: #ffa1a1;
        }

        .primero {
            background-color: #cdc7ff;
        }

        .segundo {
            background-color: #92a6ff;
        }

        .tercero {
            background-color: #7977fc;
        }
        }
    </style>
</head>

<body>
    <table>
        <caption>Calificaciones de los alumnos</caption>
        <colgroup>
            <col>
            </col>
            <col class="primero">
            </col>
            <col class="segundo">
            </col>
            <col class="tercero">
            </col>
        </colgroup>
        <thead>
            <tr>
                <th rowspan="2">ESTUDIANTE</th>
                <th colspan="3">CALIFICACIÓNN</th>
            </tr>
            <tr>
                <th>1º EV.</th>
                <th>2º EV.</th>
                <th>3º EV.</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Bernardo</td>
                <td>5.7</td>
                <td>8.3</td>
                <td>8.9</td>
            </tr>
            <tr>
                <td>Remigio</td>
                <td>4.7</td>
                <td>4.7</td>
                <td>1.3</td>
            </tr>
            <tr>
                <td>Ana</td>
                <td>9.7</td>
                <td>9.7</td>
                <td>9.9</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Ref.</td>
                <td>5.0</td>
                <td>5.0</td>
                <td>5.0</td>
            </tr>
        </tfoot>
    </table>

</html>
