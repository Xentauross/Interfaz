<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            font: sans-serif;
            margin: 0;
            box-sizing: border-box;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
        }


        section {
            display: flex;
            flex-direction: column;
            border: 1px solid black;
            width: 300px;
            height: 250px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        h2 {
            background-color: #000000;
            color: #ffffff;
            padding: 15px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            text-align: center;
            font-weight: bold;

        }

        p {
            padding: 5px;
            flex-grow: 1;
        }

        h4 {
            background-color: #acacac;
            color: #ffffff;
            padding: 15px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1em;
            font-weight: normal;
        }
    </style>
</head>

<body>
    <main>
        <section>
            <h2>Tarjeta de presentacion</h2>
            <p>Contenido del cuerpo de la tarjeta</p>
            <h4>Pie de la tarjeta</h4>
        </section>
    </main>
</body>

</html>
