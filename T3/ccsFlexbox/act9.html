<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
    <style>
        header {
            display: flex;
            justify-content: space-between;
            background-color: #3b4463;
        }

        #menu {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        #logueo {
            display: flex;
            gap: 10px;
            align-items: center;
            padding-right: 10px;
        }

        a {
            text-decoration: none;
            color: white;
        }

        img {
            height: 64px;
            width: 64px;
            padding-left: 10px;
            margin: 10px;
        }

        input[type="button"] {
            background-color: rgb(5, 143, 189);
            border-radius: 10px;
            color: white;
            font-weight: bold;
            border: 1px solid rgba(211, 211, 211, 0.418);
            height: 40px;
            width: 80px;
        }

        .UltimosArticulos {
            margin: 20px;
            padding: 24px;
        }

        .articulos {
            display: flex;
            flex-flow: column wrap;
            height: 200px;
            margin-top: 10px;
        }

        article {
            border: 1px solid lightgray;
            padding: 24px;
            margin: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        #art1 {
            order: 1;
        }

        #art2 {
            order: 3;
        }

        #art3 {
            order: 2;
        }

        #art4 {
            order: 4;
        }
    </style>
</head>


<body>

    <header id="header">
        <img src="https://avatars.githubusercontent.com/u/184088785?v=4&size=64" alt="">
        <nav id="menu">
            <a href="#">Inicio</a>
            <a href="#">Articulos</a>
            <a href="#">Contacto</a>
        </nav>
        <div id="logueo">
            <input type="button" name="Entrar" id="login" value="Entrar">
            <input type="button" name="Registro" id="resgitro" value="Registro">
        </div>
    </header>
    <main>
        <section class="UltimosArticulos">
            <h2>Úlitmos artículos</h2>
            <div class="articulos">
                <article id="art1">Contenido 1</article>
                <article id="art2">Contenido 2</article>
                <article id="art3">Contenido 3</article>
                <article id="art4">Contenido 4</article>
            </div>
        </section>
    </main>

</body>

</html>
