<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <style>
        #adaptable {
            background-color: #74b9ff;
            padding: 20px;
            margin: 2em;
            display: block;
            border-radius: 20px;
            box-shadow: 5px 5px lightgrey;
            box-sizing: border-box;
        }

        @media(max-width:500px) {
            #adaptable {
                background-color: #ff7675;
            }
        }

        @media print {
            #adaptable {
                background-color: white;
                border: 3px solid block;
            }
        }
    </style>
</head>

<body>
    <div id="adaptable">
        <h2>Bloque adaptable</h2>
        <p>Este bloque cambia de aspecto cuando la pantalla es pequeña o cuando lo imprimes.</p>
    </div>
</body>

</html>
