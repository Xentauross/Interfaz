<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 3</title>
    <style>
        section {
            display: grid;
            justify-content: center;
        }

        article {
            display: grid;
            width: 200px;
            border: 1px solid rgb(165, 165, 165);
            grid-template-rows: auto 1fr auto;

        }

        h2 {
            display: grid;
            place-items: center;
            min-height: 60px;
            background-color: #bde7ff;
            text-align: center;
            margin: 0;
        }

        p {
            margin: 0;
            text-align: start;
            padding: 10px;
            height: 90px;
        }

        h4 {
            display: grid;
            place-items: center;
            min-height: 30px;
            background-color: #bde7ff;
            text-align: center;
            margin: 0;
        }
    </style>
</head>

<body>
    <main>
        <section>
            <article>
                <h2>Título</h2>
                <p>Contenido...</p>
                <h4>Pie</h4>
            </article>
        </section>
    </main>
</body>

</html>
