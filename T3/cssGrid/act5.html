<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 5</title>
    <style>
        main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 1fr;
            background-color: #0e7c74;
            padding: 20px;
            gap: 10px;
        }

        section {
            background-color: #fff;
            border: 1px solid lightgray;
            padding: 15px;
        }

        div {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>

<body>
    <main>
        <section>Columna Izquierda</section>
        <div>
            <section>Fila 1</section>
            <section>Fila 2</section>
        </div>
    </main>
</body>

</html>
