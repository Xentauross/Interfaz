<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Lumière Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@200;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">LUMIÈRE</a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Inicio</a></li>
                <li><a href="gallery.html" class="nav-link">Galería</a></li>
                <li><a href="contact.html" class="nav-link active">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="hero-title" style="font-size: 3.5rem;">Visítanos</h1>
        </div>

        <div class="contact-wrapper glass-panel">
            <div class="contact-form">
                <form onsubmit="event.preventDefault(); alert('Mensaje enviado. Gracias.');">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Mensaje</label>
                        <textarea class="form-control" rows="5"></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%">Enviar Mensaje</button>
                </form>
            </div>

            <div class="contact-info" style="padding: 2rem;">
                <h2 style="font-size: 2rem;">Información</h2>
                <div class="info-item">
                    <span class="info-label">Dirección</span>
                    <p>Calle de las Artes 42<br>28001 Madrid, España</p>
                </div>
                <div class="info-item">
                    <span class="info-label">Horario</span>
                    <p>Martes - Domingo<br>10:00 - 20:00</p>
                </div>
                <div class="info-item">
                    <span class="info-label">Contacto</span>
                    <p>+34 91 555 0123<br>info@lumieregallery.com</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
